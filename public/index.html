<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tập Đoàn Bắc Trung Nam</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>Pi.init({ version: "2.0", sandbox: true });</script>
  <style>
    body{font-family:Arial;text-align:center;padding:30px;background:#f5f5f5;}
    h1{color:#4B0082;}
    .btn{background:#7B3FBE;color:white;padding:15px 30px;border:none;
    border-radius:10px;font-size:18px;cursor:pointer;margin-top:20px;}
    #status{margin-top:20px;font-size:16px;color:#333;}
  </style>
</head>
<body>
  <h1>🏢 Tập Đoàn Bắc Trung Nam</h1>
  <p>Chào mừng Pioneer đến với hệ sinh thái Pi!</p>
  <button class="btn" onclick="payWithPi()">⛏️ Thanh toán 1 Pi</button>
  <p id="status"></p>
<script>
function payWithPi(){
  document.getElementById("status").innerText="⏳ Đang xử lý...";
  Pi.createPayment({
    amount:1,
    memo:"Tap Doan Bac Trung Nam - Test",
    metadata:{test:true}
  },{
    onReadyForServerApproval:function(paymentId){
      document.getElementById("status").innerText="✅ Chờ duyệt: "+paymentId;
    },
    onReadyForServerCompletion:function(paymentId,txid){
      document.getElementById("status").innerText="🎉 Thành công! "+txid;
    },
    onCancel:function(){
      document.getElementById("status").innerText="❌ Đã hủy";
    },
    onError:function(error){
      document.getElementById("status").innerText="❌ Lỗi: "+error;
    }
  });
}
</script>
</body>
</html>
