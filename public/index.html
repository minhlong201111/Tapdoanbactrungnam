<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tập Đoàn Bắc Trung Nam</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body{font-family:Arial;text-align:center;padding:30px;background:#f5f5f5;}
    h1{color:#4B0082;}
    .btn{background:#7B3FBE;color:white;padding:15px 30px;
    border:none;border-radius:10px;font-size:18px;cursor:pointer;margin-top:20px;}
    #status{margin-top:20px;font-size:16px;color:#333;padding:10px;}
  </style>
</head>
<body>
  <h1>🏢 Tập Đoàn Bắc Trung Nam</h1>
  <p>Chào mừng Pioneer đến với hệ sinh thái Pi!</p>
  <button class="btn" id="payBtn">⛏️ Thanh toán 1 Pi</button>
  <p id="status">Đang tải...</p>
<script>
window.onload = function() {
  Pi.init({ version: "2.0", sandbox: true });
  document.getElementById("status").innerText = "✅ Sẵn sàng!";
  document.getElementById("payBtn").onclick = function() {
    document.getElementById("status").innerText = "⏳ Đang xử lý...";
    Pi.authenticate(["payments"], {
      onIncompletePaymentFound: function(p) {}
    }).then(function() {
      Pi.createPayment({
        amount: 1,
        memo: "Tap Doan Bac Trung Nam - Test",
        metadata: { test: true }
      }, {
        onReadyForServerApproval: function(paymentId) {
          document.getElementById("status").innerText = "⏳ Đang duyệt...";
          fetch("/api/approve", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ paymentId })
          });
        },
        onReadyForServerCompletion: function(paymentId, txid) {
          fetch("/api/complete", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ paymentId, txid })
          }).then(function() {
            document.getElementById("status").innerText = "🎉 Thành công!";
          });
        },
        onCancel: function() {
          document.getElementById("status").innerText = "❌ Đã hủy";
        },
        onError: function(e) {
          document.getElementById("status").innerText = "❌ Lỗi: " + e;
        }
      });
    });
  };
};
</script>
</body>
</html>
